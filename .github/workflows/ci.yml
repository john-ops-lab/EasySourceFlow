name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Syntax check
        run: PYTHONPATH=src python -m compileall -q src tests
      - name: Unit tests
        run: PYTHONPATH=src python -m unittest discover -s tests
      - name: Ruff
        run: ruff check src tests

  gitleaks:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          release="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          curl --fail --location --silent --show-error --output "$archive" "$release/$archive"
          curl --fail --location --silent --show-error --output checksums.txt "$release/gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          grep " $archive\$" checksums.txt | sha256sum --check --strict
          tar -xzf "$archive" -C "$RUNNER_TEMP" gitleaks
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"
      - name: Scan current tree and Git history
        run: gitleaks git . --redact --no-banner
